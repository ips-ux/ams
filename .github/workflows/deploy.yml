# Deploy — GitHub Pages
#
# Triggers after CI passes on main. Downloads the build artifact from the CI
# workflow, then deploys to GitHub Pages using the official action.
#
# Required repo setup:
#   Settings → Pages → Source = "GitHub Actions"

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment — cancel in-flight runs to avoid conflicts
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    # Only deploy when CI succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      # Download the dist/ artifact produced by the CI build job
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
