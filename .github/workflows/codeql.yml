# Security — CodeQL Analysis
#
# Runs GitHub's semantic code analysis (CodeQL) for JavaScript/TypeScript.
# Scans for security vulnerabilities and coding errors.
#
# Schedule: weekly on Mondays at 09:00 UTC + on every push to main.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'   # Every Monday 09:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Queries: security-and-quality gives broader coverage than default
          queries: security-and-quality

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
